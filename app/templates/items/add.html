{% extends "base.html" %}
{% block title %}Add Item — {{ config.APP_NAME }}{% endblock %}

{% block content %}
<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="{{ url_for('items.index') }}" class="text-gray-500 hover:text-gray-300 text-sm transition-colors">← Items</a>
    <h1 class="text-2xl font-bold">Add Item</h1>
  </div>

  <form method="post" class="flex flex-col gap-5">

    <!-- Text input pattern — required field -->
    <div>
      <label for="name" class="block text-sm text-gray-400 mb-1">
        Name <span class="text-red-400">*</span>
      </label>
      <input type="text" id="name" name="name" required autofocus
             class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                    focus:outline-none focus:border-indigo-500 transition-colors"
             placeholder="Enter a name">
    </div>

    <!-- Textarea pattern — optional long-form field.
         Use rows="3" or more depending on expected content length. -->
    <div>
      <label for="description" class="block text-sm text-gray-400 mb-1">Description</label>
      <textarea id="description" name="description" rows="3"
                class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                       focus:outline-none focus:border-indigo-500 transition-colors resize-none"
                placeholder="Optional description"></textarea>
    </div>

    <!-- Star rating widget — copy this block to add a star-rated field.
         Requires the star-btn JS in base.html (already included).
         data-group must match the hidden input's id prefix (here: "priority").
         Submits an integer 1–5 via the hidden input, or empty string if not clicked. -->
    <div>
      <label class="block text-sm text-gray-400 mb-2">Priority</label>
      <div class="flex gap-1">
        {% for i in range(1, 6) %}
        <button type="button"
                class="star-btn text-2xl text-gray-600 hover:text-yellow-400 transition-colors leading-none"
                data-group="priority" data-val="{{ i }}">★</button>
        {% endfor %}
      </div>
      <!-- Hidden input — updated by the star-btn JS when a star is clicked -->
      <input type="hidden" id="priority-val" name="priority" value="">
    </div>

    <!-- Select / dropdown pattern — use for a fixed set of enum values.
         The route validates the submitted value against VALID_STATUSES. -->
    <div>
      <label for="status" class="block text-sm text-gray-400 mb-1">Status</label>
      <select id="status" name="status"
              class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                     focus:outline-none focus:border-indigo-500 transition-colors">
        <option value="Active" selected>Active</option>
        <option value="Done">Done</option>
        <option value="Archived">Archived</option>
      </select>
    </div>

    <!-- Text input for loose category tagging.
         For strict grouping, replace with a <select> populated from a Category model. -->
    <div>
      <label for="category" class="block text-sm text-gray-400 mb-1">Category</label>
      <input type="text" id="category" name="category"
             class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                    focus:outline-none focus:border-indigo-500 transition-colors"
             placeholder="e.g. Work, Personal (optional)">
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="px-5 py-2 bg-indigo-700 hover:bg-indigo-600 rounded text-sm transition-colors">
        Add Item
      </button>
      <a href="{{ url_for('items.index') }}"
         class="px-5 py-2 bg-gray-800 hover:bg-gray-700 rounded text-sm text-gray-300 transition-colors">
        Cancel
      </a>
    </div>

  </form>
</div>
{% endblock %}
