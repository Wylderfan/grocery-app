{% extends "base.html" %}
{% block title %}Edit Item — {{ config.APP_NAME }}{% endblock %}

{% block content %}
<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="{{ url_for('items.index') }}" class="text-gray-500 hover:text-gray-300 text-sm transition-colors">← Items</a>
    <h1 class="text-2xl font-bold">Edit Item</h1>
  </div>

  <form method="post" class="flex flex-col gap-5">

    <div>
      <label for="name" class="block text-sm text-gray-400 mb-1">
        Name <span class="text-red-400">*</span>
      </label>
      <input type="text" id="name" name="name" required autofocus
             value="{{ item.name }}"
             class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                    focus:outline-none focus:border-indigo-500 transition-colors">
    </div>

    <div>
      <label for="description" class="block text-sm text-gray-400 mb-1">Description</label>
      <!-- Textarea pre-fill: put the value between the tags (not in a value= attribute) -->
      <textarea id="description" name="description" rows="3"
                class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                       focus:outline-none focus:border-indigo-500 transition-colors resize-none"
                >{{ item.description or '' }}</textarea>
    </div>

    <!-- Star rating widget pre-filled with existing value.
         Stars up to item.priority render yellow; the rest render gray.
         The hidden input is also pre-filled so the value is preserved on save without re-clicking. -->
    <div>
      <label class="block text-sm text-gray-400 mb-2">Priority</label>
      <div class="flex gap-1">
        {% set current_priority = item.priority or 0 %}
        {% for i in range(1, 6) %}
        <button type="button"
                class="star-btn text-2xl {{ 'text-yellow-400' if i <= current_priority else 'text-gray-600' }} hover:text-yellow-400 transition-colors leading-none"
                data-group="priority" data-val="{{ i }}">★</button>
        {% endfor %}
      </div>
      <input type="hidden" id="priority-val" name="priority" value="{{ item.priority or '' }}">
    </div>

    <!-- Select pre-filled: the matching <option> gets the selected attribute via Jinja -->
    <div>
      <label for="status" class="block text-sm text-gray-400 mb-1">Status</label>
      <select id="status" name="status"
              class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                     focus:outline-none focus:border-indigo-500 transition-colors">
        {% for s in ["Active", "Done", "Archived"] %}
        <option value="{{ s }}" {{ 'selected' if item.status == s else '' }}>{{ s }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label for="category" class="block text-sm text-gray-400 mb-1">Category</label>
      <input type="text" id="category" name="category"
             value="{{ item.category or '' }}"
             class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                    focus:outline-none focus:border-indigo-500 transition-colors"
             placeholder="e.g. Work, Personal (optional)">
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="px-5 py-2 bg-indigo-700 hover:bg-indigo-600 rounded text-sm transition-colors">
        Save Changes
      </button>
      <a href="{{ url_for('items.index') }}"
         class="px-5 py-2 bg-gray-800 hover:bg-gray-700 rounded text-sm text-gray-300 transition-colors">
        Cancel
      </a>
    </div>

  </form>
</div>
{% endblock %}
