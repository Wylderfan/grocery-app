{% extends "base.html" %}
{% block title %}Log Meal — {{ config.APP_NAME }}{% endblock %}

{% block content %}
<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="{{ url_for('macros.index', date=date_str) }}" class="text-gray-500 hover:text-gray-300 text-sm transition-colors">← Macro Log</a>
    <h1 class="text-2xl font-bold">Log Meal</h1>
  </div>

  <form method="post" class="flex flex-col gap-5">

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="date" class="block text-sm text-gray-400 mb-1">Date <span class="text-red-400">*</span></label>
        <input type="date" id="date" name="date" required
               value="{{ date_str }}"
               class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                      focus:outline-none focus:border-indigo-500 transition-colors">
      </div>
      <div>
        <label for="meal_label" class="block text-sm text-gray-400 mb-1">Meal</label>
        <input type="text" id="meal_label" name="meal_label"
               class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                      focus:outline-none focus:border-indigo-500 transition-colors"
               placeholder="Breakfast, Lunch, Snack…">
      </div>
    </div>

    <!-- Recipe or manual food name -->
    <div>
      <label class="block text-sm text-gray-400 mb-2">Food Source</label>
      <div class="flex gap-3 mb-3">
        <label class="flex items-center gap-2 text-sm text-gray-300 cursor-pointer">
          <input type="radio" name="food_source" value="manual" checked
                 class="accent-indigo-500" id="src-manual"> Manual entry
        </label>
        <label class="flex items-center gap-2 text-sm text-gray-300 cursor-pointer">
          <input type="radio" name="food_source" value="recipe"
                 class="accent-indigo-500" id="src-recipe"> From recipe
        </label>
      </div>

      <div id="food-manual">
        <input type="text" id="food_name" name="food_name" autofocus
               class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                      focus:outline-none focus:border-indigo-500 transition-colors"
               placeholder="e.g. Turkey Sandwich">
      </div>
      <div id="food-recipe" class="hidden">
        <select id="recipe_id" name="recipe_id"
                class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                       focus:outline-none focus:border-indigo-500 transition-colors">
          <option value="">— select a recipe —</option>
          {% for r in recipes %}
          <option value="{{ r.id }}">{{ r.name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <!-- Macro fields -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="calories" class="block text-sm text-gray-400 mb-1">Calories (kcal)</label>
        <input type="number" id="calories" name="calories" step="0.1" min="0"
               class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                      focus:outline-none focus:border-indigo-500 transition-colors"
               placeholder="e.g. 450">
      </div>
      <div>
        <label for="protein_g" class="block text-sm text-gray-400 mb-1">Protein (g)</label>
        <input type="number" id="protein_g" name="protein_g" step="0.1" min="0"
               class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                      focus:outline-none focus:border-indigo-500 transition-colors"
               placeholder="e.g. 35">
      </div>
      <div>
        <label for="carbs_g" class="block text-sm text-gray-400 mb-1">Carbs (g)</label>
        <input type="number" id="carbs_g" name="carbs_g" step="0.1" min="0"
               class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                      focus:outline-none focus:border-indigo-500 transition-colors"
               placeholder="e.g. 40">
      </div>
      <div>
        <label for="fat_g" class="block text-sm text-gray-400 mb-1">Fat (g)</label>
        <input type="number" id="fat_g" name="fat_g" step="0.1" min="0"
               class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                      focus:outline-none focus:border-indigo-500 transition-colors"
               placeholder="e.g. 15">
      </div>
    </div>

    <div>
      <label for="notes" class="block text-sm text-gray-400 mb-1">Notes</label>
      <textarea id="notes" name="notes" rows="2"
                class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                       focus:outline-none focus:border-indigo-500 transition-colors resize-none"
                placeholder="Optional notes"></textarea>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="px-5 py-2 bg-indigo-700 hover:bg-indigo-600 rounded text-sm transition-colors">
        Log Meal
      </button>
      <a href="{{ url_for('macros.index', date=date_str) }}"
         class="px-5 py-2 bg-gray-800 hover:bg-gray-700 rounded text-sm text-gray-300 transition-colors">
        Cancel
      </a>
    </div>

  </form>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
var radios    = document.querySelectorAll('input[name="food_source"]');
var manualDiv = document.getElementById('food-manual');
var recipeDiv = document.getElementById('food-recipe');

radios.forEach(function (r) {
  r.addEventListener('change', function () {
    if (this.value === 'recipe') {
      manualDiv.classList.add('hidden');
      recipeDiv.classList.remove('hidden');
      document.getElementById('food_name').value = '';
    } else {
      recipeDiv.classList.add('hidden');
      manualDiv.classList.remove('hidden');
      document.getElementById('recipe_id').value = '';
    }
  });
});
</script>
{% endblock %}
