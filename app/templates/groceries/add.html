{% extends "base.html" %}
{% block title %}Add Grocery — {{ config.APP_NAME }}{% endblock %}

{% block content %}
<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="{{ url_for('groceries.index') }}" class="text-gray-500 hover:text-gray-300 text-sm transition-colors">← Groceries</a>
    <h1 class="text-2xl font-bold">Add Grocery</h1>
  </div>

  <form method="post" class="flex flex-col gap-5">

    <div>
      <label for="name" class="block text-sm text-gray-400 mb-1">
        Name <span class="text-red-400">*</span>
      </label>
      <input type="text" id="name" name="name" required autofocus
             class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                    focus:outline-none focus:border-indigo-500 transition-colors"
             placeholder="e.g. Chicken Breast">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="quantity" class="block text-sm text-gray-400 mb-1">Quantity</label>
        <input type="number" id="quantity" name="quantity" step="0.01" min="0"
               class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                      focus:outline-none focus:border-indigo-500 transition-colors"
               placeholder="e.g. 2">
      </div>
      <div>
        <label for="unit" class="block text-sm text-gray-400 mb-1">Unit</label>
        <input type="text" id="unit" name="unit"
               class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                      focus:outline-none focus:border-indigo-500 transition-colors"
               placeholder="lbs, oz, each…">
      </div>
    </div>

    <div>
      <label for="category" class="block text-sm text-gray-400 mb-1">Category</label>
      <input type="text" id="category" name="category"
             class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                    focus:outline-none focus:border-indigo-500 transition-colors"
             placeholder="Produce, Dairy, Meat, Pantry…">
    </div>

    <div>
      <label for="status" class="block text-sm text-gray-400 mb-1">Status</label>
      <select id="status" name="status"
              class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-2 text-sm text-gray-100
                     focus:outline-none focus:border-indigo-500 transition-colors">
        <option value="Need" selected>Need (add to shopping list)</option>
        <option value="Have">Have (already in stock)</option>
      </select>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="px-5 py-2 bg-indigo-700 hover:bg-indigo-600 rounded text-sm transition-colors">
        Add Item
      </button>
      <a href="{{ url_for('groceries.index') }}"
         class="px-5 py-2 bg-gray-800 hover:bg-gray-700 rounded text-sm text-gray-300 transition-colors">
        Cancel
      </a>
    </div>

  </form>
</div>
{% endblock %}
